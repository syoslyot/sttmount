services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-local/sttmount}:latest
    build: .
    restart: unless-stopped
    volumes:
      - ./db:/app/db
      - ./app/static/gpx:/app/app/static/gpx
    environment:
      - DATABASE_URL=/app/db/sttmount.db

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup
