<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}成大山協{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

  {# ── Navbar ── #}
  {% set path = request.url.path %}
  <nav class="bg-green-800 text-white px-6 py-3 flex items-center justify-between shadow shrink-0">
    <a href="/" class="font-bold text-lg tracking-wide">成大山協</a>
    {% block navbar_extra %}{% endblock %}
  </nav>

  <main class="flex-1 {% block main_class %}max-w-5xl w-full mx-auto px-4 py-8{% endblock %}">
    {% block content %}{% endblock %}
  </main>


</body>
</html>
