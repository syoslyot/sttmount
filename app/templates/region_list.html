{% extends "base.html" %}
{% block title %}地區查詢 — 山社出隊紀錄{% endblock %}
{% block content %}

<nav class="text-sm text-gray-400 mb-6">
  <a href="/" class="hover:text-green-700">首頁</a> › 地區查詢
</nav>

<h1 class="text-xl font-bold text-gray-700 mb-6">選擇縣市</h1>

<div class="grid grid-cols-4 gap-3">
  {% for c in counties %}
  <a href="/region/{{ c }}"
     class="bg-white border border-gray-200 rounded-lg py-3 text-center text-sm font-medium
            hover:border-green-500 hover:bg-green-50 hover:text-green-800 transition">
    {{ c }}
  </a>
  {% endfor %}
</div>

{% endblock %}
