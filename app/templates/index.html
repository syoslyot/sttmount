{% extends "base.html" %}
{% block title %}成大山協{% endblock %}
{% block main_class %}flex overflow-hidden{% endblock %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.js"></script>
{% endblock %}

{% block content %}

{# ── 左半：模式切換 ── #}
<div class="w-1/2 flex flex-col overflow-hidden border-r border-gray-100" style="height: calc(100vh - 65px);">

  {# Tab 列 #}
  <div class="flex shrink-0 border-b border-gray-100">
    <button id="tab-map" onclick="setMode('map')"
      class="tab-btn flex-1 py-3.5 flex items-center justify-center text-[18px] font-medium transition border-b-2 border-transparent">
      地區
    </button>
    <button id="tab-date" onclick="setMode('date')"
      class="tab-btn flex-1 py-3.5 flex items-center justify-center text-[18px] font-medium transition border-b-2 border-transparent">
      日期
    </button>
    <button id="tab-search" onclick="setMode('search')"
      class="tab-btn flex-1 py-3.5 flex items-center justify-center text-[18px] font-medium transition border-b-2 border-transparent">
      關鍵字
    </button>
  </div>

  {# 地圖模式：台灣縣市 SVG #}
  <div id="mode-map" class="flex-1 min-h-0 flex items-center justify-center p-4">
    <svg id="taiwan-map" class="w-full h-full" style="max-height:100%;"></svg>
  </div>

  {# 日期模式 #}
  <div id="mode-date" class="hidden flex-1 overflow-y-auto p-5">
    <div class="flex flex-col gap-3">
      <div class="grid grid-cols-4 gap-1.5">
        <button onclick="loadPreset(1,'month')"
                class="border border-gray-200 rounded-lg py-1.5 text-xs text-gray-600 hover:bg-[#eef3eb] hover:border-[#5a7c50] hover:text-[#4a6741] transition">
          最近一個月
        </button>
        <button onclick="loadPreset(6,'month')"
                class="border border-gray-200 rounded-lg py-1.5 text-xs text-gray-600 hover:bg-[#eef3eb] hover:border-[#5a7c50] hover:text-[#4a6741] transition">
          最近半年
        </button>
        <button onclick="loadPreset(1,'year')"
                class="border border-gray-200 rounded-lg py-1.5 text-xs text-gray-600 hover:bg-[#eef3eb] hover:border-[#5a7c50] hover:text-[#4a6741] transition">
          最近一年
        </button>
        <button onclick="loadPreset(3,'year')"
                class="border border-gray-200 rounded-lg py-1.5 text-xs text-gray-600 hover:bg-[#eef3eb] hover:border-[#5a7c50] hover:text-[#4a6741] transition">
          最近三年
        </button>
      </div>
      <div class="flex items-center gap-2">
        <input id="date-from" type="date" onchange="loadDate()"
               class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#5a7c50]">
        <span class="text-gray-400 text-sm shrink-0">～</span>
        <input id="date-to" type="date" onchange="loadDate()"
               class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#5a7c50]">
      </div>
    </div>
  </div>

  {# 搜尋模式 #}
  <div id="mode-search" class="hidden flex-1 flex items-center justify-center p-8">
    <div class="flex w-4/5 max-w-xs gap-2">
      <input id="search-q" type="text" placeholder="隊伍名稱、地點、關鍵字…"
             class="flex-1 border border-gray-200 rounded-lg px-4 py-2.5 text-sm
                    focus:outline-none focus:border-[#5a7c50]"
             oninput="clearTimeout(searchTimer); searchTimer = setTimeout(loadSearch, 300)">
    </div>
  </div>

</div>

{# ── 右半：結果 ── #}
<div id="results" class="w-1/2 overflow-y-auto px-6 pt-8 pb-6 space-y-3" style="height: calc(100vh - 65px);"></div>

<script>
  const INITIAL_MODE = "{{ initial_mode }}";
  const PAGE = 20;

  let pageBaseUrl = '';
  let pageOffset  = 0;
  let pageLoading = false;
  let searchTimer = null;

  // ── Taiwan SVG Map ──────────────────────────────────────────────────────
  const COUNTY_NORMALIZE = {
    "台北市":"台北","新北市":"新北","基隆市":"基隆","宜蘭縣":"宜蘭",
    "桃園市":"桃園","新竹市":"新竹","新竹縣":"新竹","苗栗縣":"苗栗",
    "台中市":"台中","花蓮縣":"花蓮","彰化縣":"彰化","南投縣":"南投",
    "雲林縣":"雲林","嘉義市":"嘉義","嘉義縣":"嘉義","台南市":"台南",
    "高雄市":"高雄","屏東縣":"屏東","台東縣":"台東",
  };
  const ISLANDS = new Set(["澎湖縣","金門縣","連江縣"]);
  let selectedCounty = null;
  let visualLayer = null;

  function initMap() {
    const svgEl = document.getElementById("taiwan-map");
    const w = svgEl.clientWidth || 300;
    const h = svgEl.clientHeight || 500;
    const svg = d3.select(svgEl);

    fetch("https://cdn.jsdelivr.net/npm/taiwan-atlas/counties-10t.json")
      .then(r => r.json())
      .then(tw => {
        const counties = topojson.feature(tw, tw.objects.counties);
        const mainFeatures = counties.features.filter(f => !ISLANDS.has(f.properties.COUNTYNAME));
        const mainGeoJSON  = { type: "FeatureCollection", features: mainFeatures };
        const padding = 24;
        const proj = d3.geoMercator().fitExtent([[padding, padding], [w - padding, h - padding]], mainGeoJSON);
        const path = d3.geoPath().projection(proj);

        const g = svg.append("g");
        visualLayer = g;

        g.selectAll("path")
          .data(counties.features).join("path")
          .attr("d", path)
          .attr("fill", d => ISLANDS.has(d.properties.COUNTYNAME) ? "#f3f4f6" : "#eef3eb")
          .attr("stroke", d => ISLANDS.has(d.properties.COUNTYNAME) ? "#e5e7eb" : "#d1d5db")
          .attr("stroke-width", 0.5)
          .style("pointer-events", "none");

        const hitCanvas = document.createElement("canvas");
        hitCanvas.width  = w;
        hitCanvas.height = h;
        const hitCtx = hitCanvas.getContext("2d");
        const pathCanvas = d3.geoPath().projection(proj).context(hitCtx);

        let hoveredFeature = null;

        function findCounty(mx, my) {
          return counties.features.find(f => {
            if (ISLANDS.has(f.properties.COUNTYNAME)) return false;
            hitCtx.beginPath();
            pathCanvas(f);
            return hitCtx.isPointInPath(mx, my);
          }) || null;
        }

        svg
          .style("cursor", "default")
          .on("mousemove", function(event) {
            const [mx, my] = d3.pointer(event, svgEl);
            const found = findCounty(mx, my);
            if (found === hoveredFeature) return;
            if (hoveredFeature) {
              const prev = COUNTY_NORMALIZE[hoveredFeature.properties.COUNTYNAME];
              if (prev !== selectedCounty)
                g.selectAll("path").filter(p => p === hoveredFeature).attr("fill", "#eef3eb");
            }
            hoveredFeature = found;
            if (found) {
              svg.style("cursor", "pointer");
              const display = COUNTY_NORMALIZE[found.properties.COUNTYNAME];
              if (display !== selectedCounty)
                g.selectAll("path").filter(p => p === found).attr("fill", "#9ab88a");
            } else {
              svg.style("cursor", "default");
            }
          })
          .on("mouseleave", function() {
            if (hoveredFeature) {
              const prev = COUNTY_NORMALIZE[hoveredFeature.properties.COUNTYNAME];
              if (prev !== selectedCounty)
                g.selectAll("path").filter(p => p === hoveredFeature).attr("fill", "#eef3eb");
              hoveredFeature = null;
            }
            svg.style("cursor", "default");
          })
          .on("click", function(event) {
            const [mx, my] = d3.pointer(event, svgEl);
            const found = findCounty(mx, my);
            if (!found) return;
            const display = COUNTY_NORMALIZE[found.properties.COUNTYNAME];
            if (!display) return;
            g.selectAll("path").attr("fill", p => ISLANDS.has(p.properties.COUNTYNAME) ? "#f3f4f6" : "#eef3eb");
            g.selectAll("path").filter(p => p === found).attr("fill", "#5a7c50");
            selectedCounty = display;
            loadCounty(display);
          });
      });
  }

  function setMode(mode) {
    ['map','date','search'].forEach(m => {
      document.getElementById('mode-' + m).classList.add('hidden');
      const tab = document.getElementById('tab-' + m);
      tab.classList.remove('text-[#5a7c50]', 'border-b-[#5a7c50]');
      tab.classList.add('text-gray-500', 'border-transparent');
    });
    document.getElementById('mode-' + mode).classList.remove('hidden');
    const activeTab = document.getElementById('tab-' + mode);
    activeTab.classList.remove('text-gray-500', 'border-transparent');
    activeTab.classList.add('text-[#5a7c50]', 'border-b-[#5a7c50]');
    if (mode !== 'map') {
      selectedCounty = null;
      if (visualLayer)
        visualLayer.selectAll("path")
          .filter(d => !ISLANDS.has(d.properties.COUNTYNAME))
          .attr("fill", "#eef3eb");
    }
  }

  async function updateResults(url) {
    pageBaseUrl = url;
    pageOffset  = 0;
    pageLoading = false;
    const sep  = url.includes('?') ? '&' : '?';
    const resp = await fetch(url + sep + 'offset=0');
    document.getElementById('results').innerHTML = await resp.text();
  }

  async function loadMore() {
    if (pageLoading) return;
    if (!document.querySelector('#results .sentinel')) return;
    pageLoading = true;
    pageOffset += PAGE;
    const sep  = pageBaseUrl.includes('?') ? '&' : '?';
    const resp = await fetch(pageBaseUrl + sep + 'offset=' + pageOffset);
    const html = await resp.text();
    const results  = document.getElementById('results');
    const sentinel = results.querySelector('.sentinel');
    if (sentinel) sentinel.remove();
    results.insertAdjacentHTML('beforeend', html);
    pageLoading = false;
  }

  document.addEventListener('DOMContentLoaded', () => {
    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('date-from').value = today;
    document.getElementById('date-to').value   = today;

    document.getElementById('results').addEventListener('scroll', () => {
      const r = document.getElementById('results');
      if (r.scrollTop + r.clientHeight >= r.scrollHeight - 200) loadMore();
    });

    initMap();
  });

  function loadCounty(name) {
    updateResults('/fragment/county/' + encodeURIComponent(name));
  }

  function loadDate() {
    const from = document.getElementById('date-from').value;
    const to   = document.getElementById('date-to').value;
    if (!from && !to) return;
    let url = '/fragment/date?';
    if (from) url += 'date_from=' + from + '&';
    if (to)   url += 'date_to='   + to;
    updateResults(url);
  }

  function loadPreset(n, unit) {
    const today = new Date();
    const from  = new Date(today);
    if (unit === 'month') from.setMonth(from.getMonth() - n);
    else                   from.setFullYear(from.getFullYear() - n);
    document.getElementById('date-from').value = from.toISOString().slice(0, 10);
    document.getElementById('date-to').value   = today.toISOString().slice(0, 10);
    loadDate();
  }

  function loadSearch() {
    const q = document.getElementById('search-q').value.trim();
    if (!q) { updateResults('/fragment/recent'); return; }
    updateResults('/fragment/search?q=' + encodeURIComponent(q));
  }

  setMode(INITIAL_MODE);
  updateResults('/fragment/recent');
</script>

{% endblock %}
