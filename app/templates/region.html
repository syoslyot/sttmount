{% extends "base.html" %}
{% block title %}{{ county }} — 山社出隊紀錄{% endblock %}
{% block content %}
<nav class="text-sm text-gray-500 mb-4">
  <a href="/" class="hover:underline">地區</a> › {{ county }}
</nav>
<h1 class="text-2xl font-bold mb-6">{{ county }}</h1>
{% if regions %}
  <div class="grid grid-cols-3 gap-3">
    {% for row in regions %}
    <a href="/region/{{ county }}/{{ row.region }}"
       class="bg-white border rounded-lg p-4 hover:bg-green-50 hover:border-green-600 transition">
      {{ row.region }}
    </a>
    {% endfor %}
  </div>
{% else %}
  <p class="text-gray-500">此縣市目前沒有出隊紀錄。</p>
{% endif %}
{% endblock %}
