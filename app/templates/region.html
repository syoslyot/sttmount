{% extends "base.html" %}
{% block title %}{{ county }} — 山社出隊紀錄{% endblock %}
{% block content %}

<nav class="text-sm text-gray-400 mb-6">
  <a href="/" class="hover:text-green-700">首頁</a> ›
  <a href="/region" class="hover:text-green-700">地區查詢</a> ›
  {{ county }}
</nav>

<h1 class="text-xl font-bold text-gray-700 mb-6">{{ county }}</h1>

{% if regions %}
  <div class="grid grid-cols-3 gap-3">
    {% for row in regions %}
    <a href="/region/{{ county }}/{{ row.region }}"
       class="bg-white border border-gray-200 rounded-lg py-4 px-5 font-medium
              hover:border-green-500 hover:bg-green-50 hover:text-green-800 transition">
      {{ row.region }}
    </a>
    {% endfor %}
  </div>
{% else %}
  <p class="text-gray-400 text-sm">此縣市目前沒有出隊紀錄。</p>
{% endif %}

{% endblock %}
