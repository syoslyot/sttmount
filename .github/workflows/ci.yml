name: CI — Sync, Build, Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00（台灣時間 10:00）
  workflow_dispatch:        # 手動觸發

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/syoslyot/sttmount

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync from Google Drive
        if: ${{ secrets.GDRIVE_CREDENTIALS_JSON != '' }}
        env:
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
          GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}
        run: python3 scripts/sync_drive.py

      - name: Normalize Excel to SQLite
        if: ${{ secrets.GDRIVE_CREDENTIALS_JSON != '' }}
        run: python3 scripts/normalize.py

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
